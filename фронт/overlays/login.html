<div class="card">
    <h2>Увійти в<br>акаунт</h2>
    <form id="loginForm">
        <div class="input-group">
            <label>Email </label>
            <input type="email" id="login-email" placeholder="chub@gmail.com" required>
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="login-password" placeholder="********" required>
        </div>
        <button type="submit" class="btn-main">Увійти</button>
    </form>
    <div class="footer-link">
        Немає облікового запису? <a href="#" data-modal-target="register.html">Зареєструватися</a>
    </div>
</div>
