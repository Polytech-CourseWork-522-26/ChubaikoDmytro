<div class="card">
    <h2>Реєстрація</h2>
    <form id="registerForm">
        <div class="input-group">
            <label>Введіть ім'я</label>
            <input type="text" id="reg-name" placeholder="Іван" required>
        </div>
        <div class="input-group">
            <label>Введіть Email</label>
            <input type="email" id="reg-email" placeholder="email@example.com" required>
        </div>
        <div class="input-group">
            <label>Введіть пароль</label>
            <input type="password" id="reg-password" placeholder="********" required>
        </div>
        <button type="submit" class="btn-main" id="reg-btn">Створити</button>
    </form>
    <div class="footer-link">
        Вже маєте акаунт? <a href="#" data-modal-target="login.html">Увійти тут</a>
    </div>
</div>
